<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minijuegos EmpleaTec</title>
    <style>
        /* Paleta de colores institucional */
        :root {
            --tec-blue: #0033A0; 
            --tec-light-blue: #0055D4;
            --tec-white: #FFFFFF;
            --tec-gray: #F0F0F0;
            --tec-dark: #333333;
            --tec-green: #00853f; /* Verde Tecmilenio */
            --tec-orange: #FF8C00;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--tec-gray);
            color: var(--tec-dark);
            overflow-x: hidden;
        }

        /* Encabezado */
        header {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-logo {
            height: 60px;
            width: 60px;
            object-fit: cover;
            border-radius: 50%;
            background-color: white;
            border: 2px solid white;
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        /* Pantallas */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 85px);
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .active-screen { display: flex; }

        /* Menú Principal */
        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .game-btn {
            background-color: var(--tec-white);
            color: var(--tec-blue);
            border: 3px solid var(--tec-blue);
            border-radius: 15px;
            padding: 30px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 250px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .game-btn:hover {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            transform: translateY(-5px);
        }

        /* Botones generales */
        .btn-primary {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-primary:hover { background-color: var(--tec-light-blue); }

        .rules-box {
            background: var(--tec-white);
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Área de Juego General */
        .game-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--tec-blue);
            margin-bottom: 15px;
        }
        .game-area {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            background-color: var(--tec-white);
            border: 4px solid var(--tec-blue);
            border-radius: 15px;
            overflow: hidden;
            display: none; /* Se activa por JS según el juego */
        }
        .active-game-area { display: block; }

        /* JUEGO 1: Caída de Objetos */
        .falling-item {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            animation: fall linear forwards;
        }
        .good-item { background-color: var(--tec-light-blue); }
        .bad-item { background-color: red; }
        @keyframes fall {
            from { top: -50px; }
            to { top: 450px; }
        }

        /* JUEGO 2: Memoria */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 10px;
            height: 100%;
            box-sizing: border-box;
        }
        .memory-card {
            background-color: var(--tec-blue);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: transparent;
            transition: transform 0.2s;
            user-select: none;
        }
        .memory-card.flipped {
            background-color: var(--tec-gray);
            color: var(--tec-dark);
            border: 2px solid var(--tec-blue);
            cursor: default;
        }

        /* JUEGO 3: Color Diferente */
        .color-grid {
            display: grid;
            gap: 5px;
            padding: 10px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        .color-box {
            border-radius: 8px;
            cursor: pointer;
        }

        /* Modal Pop-up */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 51, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--tec-white);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            border: 5px solid var(--tec-orange);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .insignia-title { color: var(--tec-orange); font-size: 2rem; margin-bottom: 5px; }
        .insignia-desc { font-size: 1.1rem; color: var(--tec-dark); font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <img src="tec logo.jpg" alt="Logo Tec" class="header-logo">
        <h1>EMPLEATEC</h1>
        <img src="Tecmilenio_Logo.jpg" alt="Logo Tecmilenio" class="header-logo">
    </header>

    <div id="screen-menu" class="screen active-screen">
        <h2 style="color: var(--tec-blue); font-size: 2rem; margin-bottom: 40px;">Selecciona tu Desafío</h2>
        <div class="menu-container">
            <button class="game-btn" onclick="showRules(1)">1. El Salto al Futuro</button>
            <button class="game-btn" onclick="showRules(2)">2. Arquitecto de Conexiones</button>
            <button class="game-btn" onclick="showRules(3)">3. Misión: Código Crítico</button>
        </div>
    </div>

    <div id="screen-rules" class="screen">
        <div class="rules-box">
            <h2 id="rules-title" style="color: var(--tec-blue); font-size: 1.8rem;">Título</h2>
            <p id="rules-text" style="font-size: 1.2rem; margin: 20px 0;">Reglas...</p>
            <button class="btn-primary" onclick="startGame()">INICIAR (25s)</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-header">
            <span id="timer">Tiempo: 25s</span>
            <span id="score-display">Puntos: 0</span>
        </div>
        
        <div id="game-area-1" class="game-area"></div>
        
        <div id="game-area-2" class="game-area memory-grid"></div>

        <div id="game-area-3" class="game-area color-grid"></div>
    </div>

    <div id="result-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--tec-blue); margin-top: 0;">¡Insignia Obtenida!</h2>
            <h3 class="insignia-title" id="result-badge">Insignia</h3>
            <p class="insignia-desc" id="result-desc">Habilidad destacada.</p>
            <button class="btn-primary" onclick="returnToMenu()">Regresar al Menú</button>
        </div>
    </div>

    <script>
        // Variables globales
        let currentGame = 0;
        let timeLeft = 25;
        let timerInterval;
        let score = 0;
        let gameLogicInterval;

        // Base de datos de juegos e Insignias
        const gameData = {
            1: {
                title: "El Salto al Futuro",
                rules: "Haz clic en los círculos azules (innovaciones) que caen para sumar puntos. Evita los rojos (resistencias). ¡Demuestra tus reflejos!",
                eval: (pts) => {
                    if (pts >= 150) return { badge: "Agente de Cambio 4.0", desc: "Destreza Digital Excepcional." };
                    if (pts >= 80) return { badge: "Visionario Audaz", desc: "Gran capacidad para liderar el cambio." };
                    return { badge: "Ninja de la Adaptabilidad", desc: "Habilidad para ajustarse al entorno cambiante." };
                }
            },
            2: {
                title: "Arquitecto de Conexiones",
                rules: "Juego de memoria. Encuentra los pares de cartas ocultas lo más rápido posible. Haz clic para voltearlas.",
                eval: (pares) => {
                    if (pares >= 6) return { badge: "Catalizador de Talento", desc: "Excelente inteligencia social e inspiración." };
                    if (pares >= 3) return { badge: "Desarrollador de Talento", desc: "Gran enfoque en construir relaciones." };
                    return { badge: "Embajador de Servicio", desc: "Fuerte orientación al servicio y empatía." };
                }
            },
            3: {
                title: "Misión: Código Crítico",
                rules: "Encuentra y haz clic en el cuadro que tiene un color ligeramente distinto. La cuadrícula crecerá en cada acierto.",
                eval: (niveles) => {
                    if (niveles >= 12) return { badge: "Detective de Soluciones", desc: "Resolución de problemas implacable." };
                    if (niveles >= 6) return { badge: "Arquitecto de Soluciones", desc: "Pensamiento crítico y analítico." };
                    return { badge: "Generador de Resultados", desc: "Fuerte orientación a resultados rápidos." };
                }
            }
        };

        // Navegación
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        function showRules(gameId) {
            currentGame = gameId;
            document.getElementById('rules-title').innerText = gameData[gameId].title;
            document.getElementById('rules-text').innerText = gameData[gameId].rules;
            switchScreen('screen-rules');
        }

        function returnToMenu() {
            document.getElementById('result-modal').style.display = 'none';
            switchScreen('screen-menu');
            clearInterval(timerInterval);
            clearInterval(gameLogicInterval);
        }

        // Inicio Común
        function startGame() {
            score = 0;
            timeLeft = 25;
            updateHeader();
            switchScreen('screen-game');
            
            // Mostrar solo el área del juego actual
            document.querySelectorAll('.game-area').forEach(el => el.classList.remove('active-game-area'));
            document.getElementById(`game-area-${currentGame}`).classList.add('active-game-area');

            // Iniciar lógica específica
            if (currentGame === 1) initGame1();
            if (currentGame === 2) initGame2();
            if (currentGame === 3) initGame3();

            // Temporizador global
            timerInterval = setInterval(() => {
                timeLeft--;
                updateHeader();
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateHeader() {
            document.getElementById('timer').innerText = `Tiempo: ${timeLeft}s`;
            let displayScore = currentGame === 2 ? `Pares: ${score}` : (currentGame === 3 ? `Nivel: ${score}` : `Puntos: ${score}`);
            document.getElementById('score-display').innerText = displayScore;
        }

        // --- LÓGICA JUEGO 1: Objetos cayendo ---
        function initGame1() {
            const area = document.getElementById('game-area-1');
            area.innerHTML = '';
            gameLogicInterval = setInterval(() => {
                if (timeLeft > 0) spawnItem(area);
            }, 600); // Aparece un objeto cada 0.6s
        }

        function spawnItem(area) {
            const item = document.createElement('div');
            const isGood = Math.random() > 0.3; // 70% buenos, 30% malos
            
            item.classList.add('falling-item');
            item.classList.add(isGood ? 'good-item' : 'bad-item');
            
            // Posición horizontal aleatoria
            item.style.left = Math.floor(Math.random() * (area.clientWidth - 40)) + 'px';
            
            // Velocidad aleatoria
            const duration = Math.random() * 2 + 1.5; 
            item.style.animationDuration = `${duration}s`;

            item.onclick = () => {
                score += isGood ? 20 : -10; // Puntuación
                updateHeader();
                item.remove();
            };

            // Eliminar al terminar animación
            item.addEventListener('animationend', () => item.remove());
            area.appendChild(item);
        }

        // --- LÓGICA JUEGO 2: Memoria ---
        let flippedCards = [];
        function initGame2() {
            const area = document.getElementById('game-area-2');
            area.innerHTML = '';
            flippedCards = [];
            
            const emojis = ['💡', '🤝', '🚀', '🎯', '📈', '🧠'];
            let deck = [...emojis, ...emojis];
            deck.sort(() => 0.5 - Math.random()); // Mezclar

            deck.forEach(symbol => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.symbol = symbol;
                card.innerText = symbol;
                
                card.onclick = () => handleCardClick(card);
                area.appendChild(card);
            });
        }

        function handleCardClick(card) {
            if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped');
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    setTimeout(checkMatch, 500);
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.symbol === card2.dataset.symbol) {
                score++; // Un par encontrado
                updateHeader();
                if (score === 6) endGame(); // Ganó rápido
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
            }
            flippedCards = [];
        }

        // --- LÓGICA JUEGO 3: Color Diferente ---
        let gridSize = 2;
        function initGame3() {
            gridSize = 2; // Empieza 2x2
            renderColorGrid();
        }

        function renderColorGrid() {
            const area = document.getElementById('game-area-3');
            area.innerHTML = '';
            
            area.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            area.style.gridTemplateRows = `repeat(${gridSize}, 1fr)`;

            // Generar color base aleatorio
            const r = Math.floor(Math.random() * 200);
            const g = Math.floor(Math.random() * 200);
            const b = Math.floor(Math.random() * 200);
            const baseColor = `rgb(${r}, ${g}, ${b})`;

            // Dificultad (qué tan diferente es el color)
            const offset = Math.max(10, 50 - (score * 3)); 
            const diffColor = `rgb(${r + offset}, ${g + offset}, ${b + offset})`;

            const totalSquares = gridSize * gridSize;
            const diffIndex = Math.floor(Math.random() * totalSquares);

            for (let i = 0; i < totalSquares; i++) {
                const box = document.createElement('div');
                box.classList.add('color-box');
                
                if (i === diffIndex) {
                    box.style.backgroundColor = diffColor;
                    box.onclick = () => {
                        score++;
                        if(gridSize < 8) gridSize++; // Aumentar dificultad
                        updateHeader();
                        renderColorGrid();
                    };
                } else {
                    box.style.backgroundColor = baseColor;
                    box.onclick = () => {
                        // Penalización por fallo
                        timeLeft = Math.max(0, timeLeft - 2); 
                        updateHeader();
                    };
                }
                area.appendChild(box);
            }
        }

        // --- Fin del Juego ---
        function endGame() {
            clearInterval(timerInterval);
            clearInterval(gameLogicInterval);
            
            // Evaluar resultado según el juego
            const result = gameData[currentGame].eval(score);
            
            // Mostrar texto limpio en modal
            document.getElementById('result-badge').innerText = result.badge;
            document.getElementById('result-desc').innerText = result.desc;
            
            document.getElementById('result-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
