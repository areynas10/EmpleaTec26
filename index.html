<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minijuegos EmpleaTec</title>
    <style>
        /* Paleta de colores institucional */
        :root {
            --tec-blue: #0033A0; 
            --tec-light-blue: #0055D4;
            --tec-white: #FFFFFF;
            --tec-gray: #F0F0F0;
            --tec-dark: #333333;
            --tec-orange: #FF8C00;
            --tec-red: #D32F2F;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--tec-gray);
            color: var(--tec-dark);
            overflow-x: hidden;
        }

        /* Encabezado sin logos, solo texto centrado */
        header {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 3px;
            font-weight: bold;
        }

        /* Pantallas */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 85px);
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .active-screen { display: flex; }

        /* Menú Principal */
        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .game-btn {
            background-color: var(--tec-white);
            color: var(--tec-blue);
            border: 3px solid var(--tec-blue);
            border-radius: 15px;
            padding: 30px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 250px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .game-btn:hover {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            transform: translateY(-5px);
        }

        /* Botones generales */
        .btn-primary {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-primary:hover { background-color: var(--tec-light-blue); }

        .btn-exit {
            background-color: var(--tec-red);
            color: var(--tec-white);
            border: none;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-exit:hover { background-color: #B71C1C; }

        .rules-box {
            background: var(--tec-white);
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Área de Juego General */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--tec-blue);
            margin-bottom: 15px;
        }
        .game-area {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            background-color: var(--tec-white);
            border: 4px solid var(--tec-blue);
            border-radius: 15px;
            overflow: hidden;
            display: none; /* Asegura que estén ocultos por defecto */
            box-sizing: border-box;
        }

        /* Aseguramos los modos de display correctos al activarse */
        #game-area-1.active-game-area { display: block; }
        #game-area-2.active-game-area { display: grid; }
        #game-area-3.active-game-area { display: block; }

        /* JUEGO 1: Caída de Objetos */
        .falling-item {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            animation: fall linear forwards;
        }
        .good-item { background-color: var(--tec-light-blue); }
        .bad-item { background-color: red; }
        @keyframes fall {
            from { top: -50px; }
            to { top: 450px; }
        }

        /* JUEGO 2: Memoria (Modificado a 20 cartas / 5 columnas) */
        .memory-grid {
            grid-template-columns: repeat(5, 1fr); /* 5 columnas x 4 filas */
            gap: 8px;
            padding: 10px;
            height: 100%;
        }
        .memory-card {
            background-color: var(--tec-blue);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: transparent;
            transition: transform 0.2s;
            user-select: none;
        }
        .memory-card.flipped {
            background-color: var(--tec-gray);
            color: var(--tec-dark);
            border: 2px solid var(--tec-blue);
            cursor: default;
        }

        /* JUEGO 3: Código Crítico (Terminal activa) */
        .terminal-container {
            background-color: #1e1e1e;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 10px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            transition: background-color 0.2s;
        }
        .code-word {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ff4d4d; /* Errores en rojo */
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 4px;
            user-select: none;
        }
        .code-word:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }
        .target-word {
            color: #00ff00; /* Solución en verde */
        }

        /* Modal Pop-up */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 51, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--tec-white);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            border: 5px solid var(--tec-orange);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .insignia-title { color: var(--tec-orange); font-size: 2rem; margin-bottom: 5px; }
        .insignia-desc { font-size: 1.1rem; color: var(--tec-dark); font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>EMPLEATEC</h1>
    </header>

    <div id="screen-menu" class="screen active-screen">
        <h2 style="color: var(--tec-blue); font-size: 2rem; margin-bottom: 40px;">Selecciona tu Desafío</h2>
        <div class="menu-container">
            <button class="game-btn" onclick="showRules(1)">1. El Salto al Futuro</button>
            <button class="game-btn" onclick="showRules(2)">2. Arquitecto de Conexiones</button>
            <button class="game-btn" onclick="showRules(3)">3. Misión: Código Crítico</button>
        </div>
    </div>

    <div id="screen-rules" class="screen">
        <div class="rules-box">
            <h2 id="rules-title" style="color: var(--tec-blue); font-size: 1.8rem;">Título</h2>
            <p id="rules-text" style="font-size: 1.2rem; margin: 20px 0;">Reglas...</p>
            <button class="btn-primary" onclick="startGame()">INICIAR RETO</button>
            <br>
            <button class="btn-exit" style="margin-top: 15px;" onclick="abortGame()">Volver al Menú</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-header">
            <span id="timer">Tiempo: 0s</span>
            <button class="btn-exit" onclick="abortGame()">Salir al Menú</button>
            <span id="score-display">Puntos: 0</span>
        </div>
        
        <div id="game-area-1" class="game-area"></div>
        
        <div id="game-area-2" class="game-area memory-grid"></div>

        <div id="game-area-3" class="game-area">
            <div id="terminal-content" class="terminal-container"></div>
        </div>
    </div>

    <div id="result-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--tec-blue); margin-top: 0;">¡Insignia Obtenida!</h2>
            <h3 class="insignia-title" id="result-badge">Insignia</h3>
            <p class="insignia-desc" id="result-desc">Habilidad destacada.</p>
            <button class="btn-primary" onclick="returnToMenu()">Regresar al Menú</button>
        </div>
    </div>

    <script>
        // Variables globales
        let currentGame = 0;
        let timeLeft = 0;
        let timerInterval;
        let score = 0;
        let game1Interval;
        let game3JumpInterval;

        // Base de datos de juegos
        const gameData = {
            1: {
                title: "El Salto al Futuro",
                rules: "Duración: 20 segundos.\nHaz clic rápido en los círculos azules (innovaciones) que caen. Evita los rojos (resistencias). ¡Ahora caen más rápido!",
                eval: (pts) => {
                    if (pts >= 120) return { badge: "Agente de Cambio 4.0", desc: "Destreza Digital Excepcional bajo presión." };
                    if (pts >= 60) return { badge: "Visionario Audaz", desc: "Gran capacidad para liderar el cambio." };
                    return { badge: "Ninja de la Adaptabilidad", desc: "Habilidad para ajustarse al entorno cambiante." };
                }
            },
            2: {
                title: "Arquitecto de Conexiones",
                rules: "Duración: 30 segundos.\nJuego de memoria. Encuentra los 10 pares de cartas ocultas lo más rápido posible. Haz clic para voltearlas.",
                eval: (pares) => {
                    if (pares >= 8) return { badge: "Catalizador de Talento", desc: "Excelente inteligencia y retención." };
                    if (pares >= 4) return { badge: "Desarrollador de Talento", desc: "Gran enfoque y persistencia al conectar." };
                    return { badge: "Embajador de Servicio", desc: "Mucha orientación y paciencia al detalle." };
                }
            },
            3: {
                title: "Misión: Código Crítico",
                rules: "Duración: 20 segundos.\nEscanea la terminal. Atrapa la palabra '[SOLUCIÓN]' que cambiará de lugar CADA SEGUNDO. Si tocas el código rojo, pierdes tiempo.",
                eval: (aciertos) => {
                    if (aciertos >= 8) return { badge: "Detective de Soluciones", desc: "Resolución impecable y ágil. Encuentras lo oculto al instante." };
                    if (aciertos >= 4) return { badge: "Arquitecto de Soluciones", desc: "Pensamiento crítico asombroso bajo presión visual." };
                    return { badge: "Generador de Resultados", desc: "Fuerte orientación a lograr objetivos superando obstáculos." };
                }
            }
        };

        // Navegación limpia y segura
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        function showRules(gameId) {
            currentGame = gameId;
            document.getElementById('rules-title').innerText = gameData[gameId].title;
            document.getElementById('rules-text').innerText = gameData[gameId].rules;
            switchScreen('screen-rules');
        }

        function clearAllIntervals() {
            clearInterval(timerInterval);
            clearInterval(game1Interval);
            clearInterval(game3JumpInterval);
        }

        function abortGame() {
            clearAllIntervals();
            switchScreen('screen-menu');
        }

        function returnToMenu() {
            document.getElementById('result-modal').style.display = 'none';
            abortGame();
        }

        // --- Inicio del Juego Común ---
        function startGame() {
            clearAllIntervals();
            score = 0;
            
            // Asignar tiempos según el juego para mayor dificultad
            if (currentGame === 1) timeLeft = 20;
            if (currentGame === 2) timeLeft = 30; // 30s porque son 20 cartas
            if (currentGame === 3) timeLeft = 20;

            updateHeader();
            switchScreen('screen-game');
            
            // Ocultar todas las áreas de juego y limpiar contenidos previos si existen
            document.querySelectorAll('.game-area').forEach(el => el.classList.remove('active-game-area'));
            
            const currentArea = document.getElementById(`game-area-${currentGame}`);
            currentArea.classList.add('active-game-area');

            // Iniciar lógica específica
            if (currentGame === 1) initGame1();
            if (currentGame === 2) initGame2();
            if (currentGame === 3) initGame3();

            // Temporizador global
            timerInterval = setInterval(() => {
                timeLeft--;
                updateHeader();
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function updateHeader() {
            document.getElementById('timer').innerText = `Tiempo: ${timeLeft}s`;
            let displayScore = currentGame === 2 ? `Pares: ${score}` : (currentGame === 3 ? `Aciertos: ${score}` : `Puntos: ${score}`);
            document.getElementById('score-display').innerText = displayScore;
        }

        // --- LÓGICA JUEGO 1: Objetos cayendo (Más rápidos) ---
        function initGame1() {
            const area = document.getElementById('game-area-1');
            area.innerHTML = '';
            
            // Aparecen cada 450ms en lugar de 600ms para más agilidad
            game1Interval = setInterval(() => {
                if (timeLeft > 0) spawnItem(area);
            }, 450);
        }

        function spawnItem(area) {
            const item = document.createElement('div');
            const isGood = Math.random() > 0.35; // 65% buenos, 35% malos
            item.classList.add('falling-item');
            item.classList.add(isGood ? 'good-item' : 'bad-item');
            item.style.left = Math.floor(Math.random() * (area.clientWidth - 40)) + 'px';
            
            // Caen más rápido: de 0.8 a 2.0 segundos de duración
            item.style.animationDuration = `${Math.random() * 1.2 + 0.8}s`;
            
            item.onclick = () => {
                score += isGood ? 20 : -15; // Más penalización si se equivoca
                updateHeader();
                item.remove();
            };
            item.addEventListener('animationend', () => item.remove());
            area.appendChild(item);
        }

        // --- LÓGICA JUEGO 2: Memoria (20 Tarjetas / 10 Pares) ---
        let flippedCards = [];
        function initGame2() {
            const area = document.getElementById('game-area-2');
            area.innerHTML = '';
            flippedCards = [];
            
            // 10 Emojis = 20 Cartas
            const emojis = ['💡', '🤝', '🚀', '🎯', '📈', '🧠', '⚙️', '🔍', '💻', '🌟'];
            let deck = [...emojis, ...emojis].sort(() => 0.5 - Math.random());
            
            deck.forEach(symbol => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.symbol = symbol;
                card.innerText = symbol;
                card.onclick = () => handleCardClick(card);
                area.appendChild(card);
            });
        }

        function handleCardClick(card) {
            if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped');
                flippedCards.push(card);
                if (flippedCards.length === 2) setTimeout(checkMatch, 400);
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.symbol === card2.dataset.symbol) {
                score++; 
                updateHeader();
                if (score === 10) endGame(); // 10 pares es ganar automáticamente
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
            }
            flippedCards = [];
        }

        // --- LÓGICA JUEGO 3: Código Crítico (Salto cada 1 segundo) ---
        let g3Spans = [];
        let currentTargetIndex = -1;
        const junkWords = ["[ERROR]", "NULL_PTR", "404_NOT_FOUND", "SYS_FAIL", "BAD_GATEWAY", "DENIED", "VOID", "EXCEPTION", "TIMEOUT"];

        function initGame3() {
            const terminal = document.getElementById('terminal-content');
            terminal.innerHTML = '';
            g3Spans = [];
            currentTargetIndex = -1;

            const totalWords = 45; 
            for (let i = 0; i < totalWords; i++) {
                let wordSpan = document.createElement('span');
                wordSpan.classList.add('code-word');
                wordSpan.innerText = junkWords[Math.floor(Math.random() * junkWords.length)];
                wordSpan.onclick = () => handleG3Click(i);
                terminal.appendChild(wordSpan);
                g3Spans.push(wordSpan); // Guardamos la referencia
            }

            placeG3Target(); // Colocar el primer objetivo
            
            // Hacer que la palabra salte automáticamente cada 1 segundo
            game3JumpInterval = setInterval(placeG3Target, 1000);
        }

        function placeG3Target() {
            if (timeLeft <= 0) return;
            
            // Si ya hay un target, lo regresamos a ser palabra basura roja
            if (currentTargetIndex !== -1) {
                g3Spans[currentTargetIndex].innerText = junkWords[Math.floor(Math.random() * junkWords.length)];
                g3Spans[currentTargetIndex].classList.remove('target-word');
            }

            // Elegir nueva posición aleatoria
            currentTargetIndex = Math.floor(Math.random() * g3Spans.length);
            g3Spans[currentTargetIndex].innerText = "[SOLUCIÓN]";
            g3Spans[currentTargetIndex].classList.add('target-word');
        }

        function handleG3Click(index) {
            if (index === currentTargetIndex) {
                score++;
                updateHeader();
                
                // Limpiar el timer y forzar un salto inmediato a otra posición
                clearInterval(game3JumpInterval);
                placeG3Target();
                game3JumpInterval = setInterval(placeG3Target, 1000); 
                
            } else {
                // Penalización de tiempo
                timeLeft = Math.max(0, timeLeft - 2);
                updateHeader();
                
                // Efecto visual de error
                const terminal = document.getElementById('terminal-content');
                terminal.style.backgroundColor = "#4a0000";
                setTimeout(() => { terminal.style.backgroundColor = "#1e1e1e"; }, 200);
            }
        }

        // --- Fin del Juego ---
        function endGame() {
            clearAllIntervals();
            const result = gameData[currentGame].eval(score);
            document.getElementById('result-badge').innerText = result.badge;
            document.getElementById('result-desc').innerText = result.desc;
            document.getElementById('result-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
