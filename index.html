<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minijuegos EmpleaTec</title>
    <style>
        /* Paleta de colores institucional */
        :root {
            --tec-blue: #0033A0; 
            --tec-light-blue: #0055D4;
            --tec-white: #FFFFFF;
            --tec-gray: #F0F0F0;
            --tec-dark: #333333;
            --tec-orange: #FF8C00;
            --tec-red: #D32F2F;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--tec-gray);
            color: var(--tec-dark);
            overflow-x: hidden;
        }

        /* Encabezado sin logos, solo texto centrado */
        header {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 3px;
            font-weight: bold;
        }

        /* Pantallas */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 85px);
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .active-screen { display: flex; }

        /* Menú Principal */
        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        .game-btn {
            background-color: var(--tec-white);
            color: var(--tec-blue);
            border: 3px solid var(--tec-blue);
            border-radius: 15px;
            padding: 30px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 250px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .game-btn:hover {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            transform: translateY(-5px);
        }

        /* Botones generales */
        .btn-primary {
            background-color: var(--tec-blue);
            color: var(--tec-white);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn-primary:hover { background-color: var(--tec-light-blue); }

        .btn-exit {
            background-color: var(--tec-red);
            color: var(--tec-white);
            border: none;
            padding: 8px 15px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-exit:hover { background-color: #B71C1C; }

        .rules-box {
            background: var(--tec-white);
            padding: 40px;
            border-radius: 15px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Área de Juego General */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--tec-blue);
            margin-bottom: 15px;
        }
        .game-area {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            background-color: var(--tec-white);
            border: 4px solid var(--tec-blue);
            border-radius: 15px;
            overflow: hidden;
            display: none; 
            box-sizing: border-box;
        }

        #game-area-1.active-game-area { display: block; }
        #game-area-2.active-game-area { display: grid; }
        #game-area-3.active-game-area { display: block; }

        /* JUEGO 1: Caída de Objetos */
        .falling-item {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            animation: fall linear forwards;
        }
        .good-item { background-color: var(--tec-light-blue); }
        .bad-item { background-color: red; }
        @keyframes fall {
            from { top: -50px; }
            to { top: 450px; }
        }

        /* JUEGO 2: Memoria */
        .memory-grid {
            grid-template-columns: repeat(5, 1fr); 
            gap: 8px;
            padding: 10px;
            height: 100%;
        }
        .memory-card {
            background-color: var(--tec-blue);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: transparent;
            transition: transform 0.2s;
            user-select: none;
        }
        .memory-card.flipped {
            background-color: var(--tec-gray);
            color: var(--tec-dark);
            border: 2px solid var(--tec-blue);
            cursor: default;
        }

        /* JUEGO 3: Código Crítico */
        .terminal-container {
            background-color: #1e1e1e;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
