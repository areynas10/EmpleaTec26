<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Código Crítico</title>
    <style>
        /* Estilos generales para darle aspecto de terminal/código */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e1e;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        h1 {
            margin-bottom: 5px;
        }

        p {
            margin-bottom: 30px;
            color: #ccc;
        }

        /* Pantalla donde parpadean las palabras */
        #pantalla-juego {
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            padding: 20px 40px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            width: 350px;
            height: 80px;
            margin-bottom: 25px;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        /* Botones de control */
        button {
            background-color: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 0 10px;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background-color: #00cc00;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        /* Mensaje de victoria o derrota */
        #mensaje-resultado {
            font-size: 1.5rem;
            margin-top: 25px;
            font-weight: bold;
            min-height: 35px; /* Para que la pantalla no salte cuando aparezca el texto */
        }
    </style>
</head>
<body>

    <h1>Código Crítico</h1>
    <p>Presiona "¡LO ENCONTRÉ!" justo cuando aparezca la palabra <strong>SOLUCIÓN</strong></p>

    <div id="pantalla-juego">...</div>

    <div>
        <button id="btn-iniciar" onclick="iniciarJuego()">Iniciar Escaneo</button>
        <button id="btn-detener" onclick="verificarPalabra()" disabled>¡LO ENCONTRÉ!</button>
    </div>

    <div id="mensaje-resultado"></div>

    <script>
        // Diccionario de palabras señuelo y la palabra clave
        const bancoDePalabras = [
            "ERROR", "SISTEMA", "BUG", "ALERTA", "BRECHA",
            "DATOS", "VIRUS", "RED", "CÓDIGO", "FALLO",
            "SOLUCIÓN", "HACK", "ACCESO", "NODO", "ROOT",
            "KERNEL", "DEBUG", "PROXY", "FIREWALL", "CACHE"
        ];

        let intervaloJuego;
        // --- AQUÍ ESTÁ EL AJUSTE FINAL: 70 milisegundos (0.07 segundos) ---
        const velocidadEscaneo = 70; 
        
        let palabraActual = "";
        let juegoActivo = false;

        const pantalla = document.getElementById('pantalla-juego');
        const mensajeResultado = document.getElementById('mensaje-resultado');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnDetener = document.getElementById('btn-detener');

        function obtenerPalabraAleatoria() {
            const indiceAleatorio = Math.floor(Math.random() * bancoDePalabras.length);
            return bancoDePalabras[indiceAleatorio];
        }

        function iniciarJuego() {
            if (juegoActivo) return;
            
            juegoActivo = true;
            mensajeResultado.textContent = ""; // Limpiar mensajes anteriores
            
            // Alternar estado de botones
            btnIniciar.disabled = true;
            btnDetener.disabled = false;

            // Iniciar el parpadeo de palabras
            intervaloJuego = setInterval(() => {
                palabraActual = obtenerPalabraAleatoria();
                pantalla.textContent = palabraActual;
            }, velocidadEscaneo);
        }

        function verificarPalabra() {
            if (!juegoActivo) return;

            // Detener el juego
            clearInterval(intervaloJuego);
            juegoActivo = false;
            
            // Alternar estado de botones
            btnIniciar.disabled = false;
            btnDetener.disabled = true;

            // Comprobar si acertó
            if (palabraActual === "SOLUCIÓN") {
                mensajeResultado.textContent = "¡ÉXITO! Encontraste la SOLUCIÓN a tiempo.";
                mensajeResultado.style.color = "#00ff00"; // Verde
                pantalla.style.borderColor = "#00ff00";
            } else {
                mensajeResultado.textContent = `¡ERROR! Detuviste el escaneo en: ${palabraActual}`;
                mensajeResultado.style.color = "#ff4444"; // Rojo
                pantalla.style.borderColor = "#ff4444";
                
                // Restaurar el color del borde después de un segundo para que puedan volver a jugar
                setTimeout(() => {
                    pantalla.style.borderColor = "#00ff00";
                }, 1500);
            }
        }
    </script>
</body>
</html>
